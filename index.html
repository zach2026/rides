<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#00e676">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Ride Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080b10;--surface:#0f1520;--border:#1e2d42;--green:#00e676;--blue:#40c4ff;--orange:#ff9100;--red:#ff5252;--yellow:#ffd740;--text:#e8f0fe;--muted:#546e7a;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;padding-bottom:140px;}
.header{background:linear-gradient(180deg,#0d1b2a,#080b10);border-bottom:1px solid var(--border);padding:calc(14px + env(safe-area-inset-top)) 16px 0;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.app-title{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:800;color:var(--green);}
.app-sub{font-size:0.58rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
.live-clock{font-family:'IBM Plex Mono',monospace;font-size:1.1rem;font-weight:600;color:var(--green);text-align:right;}
.live-date{font-size:0.55rem;color:var(--muted);text-align:right;margin-top:2px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-top:1px solid var(--border);}
.stat{background:var(--surface);padding:9px 4px;text-align:center;}
.stat-val{font-family:'IBM Plex Mono',monospace;font-size:0.85rem;font-weight:600;}
.g{color:var(--green);}.b{color:var(--blue);}.o{color:var(--orange);}.y{color:var(--yellow);}
.stat-lbl{font-size:0.5rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:3px;}
.banner{margin:12px 14px 0;padding:12px 14px;background:rgba(0,230,118,0.08);border:1px solid var(--green);border-radius:12px;display:none;}
.banner.show{display:block;}
.banner-label{font-size:0.6rem;color:var(--green);text-transform:uppercase;letter-spacing:0.08em;font-family:'IBM Plex Mono',monospace;margin-bottom:4px;}
.banner-title{font-size:0.85rem;font-weight:600;}
.banner-sub{font-size:0.7rem;color:var(--muted);margin-top:2px;}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width 1s linear;}
.syncbar{text-align:center;padding:5px;font-size:0.65rem;font-family:'IBM Plex Mono',monospace;display:none;}
.syncbar.show{display:block;}
.syncbar.s{color:var(--yellow);}.syncbar.ok{color:var(--green);}.syncbar.err{color:var(--red);}
.content{max-width:680px;margin:0 auto;padding:12px 14px;}
.day-block{margin-bottom:20px;}
.day-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:12px 12px 0 0;border-bottom:none;}
.day-title{font-family:'Syne',sans-serif;font-size:0.8rem;font-weight:700;text-transform:uppercase;}
.day-earn{font-family:'IBM Plex Mono',monospace;font-size:1.05rem;font-weight:600;color:var(--green);}
.entries{border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;overflow:hidden;}
.entry{display:flex;border-bottom:1px solid var(--border);position:relative;}
.entry:last-child{border-bottom:none;}
.entry.done{opacity:0.4;}
.entry.active{box-shadow:inset 3px 0 0 var(--green);}
.entry.next{box-shadow:inset 3px 0 0 var(--yellow);}
.tc{width:50px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:12px 0 0;}
.tt{font-family:'IBM Plex Mono',monospace;font-size:0.58rem;color:var(--muted);text-align:center;}
.dot{width:12px;height:12px;border-radius:50%;border:2.5px solid var(--green);background:rgba(0,230,118,0.1);margin:5px 0 0;}
.dot.dd{border-color:var(--blue);background:rgba(64,196,255,0.08);}
.dot.act{background:var(--green);box-shadow:0 0 8px var(--green);}
.dot.dn{border-color:var(--muted);background:var(--muted);}
.vl{width:2px;flex:1;min-height:14px;background:var(--border);margin-top:4px;}
.card{flex:1;padding:10px 12px 10px 6px;background:#0d1a10;}
.card.dh{background:#0c1420;opacity:0.85;}
.ct{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.badge{font-size:0.55rem;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:0.07em;padding:2px 6px;border-radius:4px;font-weight:600;background:rgba(0,230,118,0.15);color:var(--green);}
.badge.ba{background:var(--green);color:#080b10;}
.badge.bn{background:rgba(255,215,64,0.2);color:var(--yellow);}
.badge.bd{background:rgba(84,110,122,0.2);color:var(--muted);}
.badge.bh{background:rgba(64,196,255,0.12);color:var(--blue);}
.price{font-family:'IBM Plex Mono',monospace;font-size:0.9rem;font-weight:600;color:var(--green);}
.bonus-l{font-size:0.58rem;color:var(--yellow);display:block;margin-top:1px;text-align:right;}
.route{display:flex;flex-direction:column;gap:3px;margin-bottom:5px;}
.rp{display:flex;align-items:flex-start;gap:6px;font-size:0.7rem;line-height:1.3;}
.rd{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px;background:var(--green);}
.rd.to{background:var(--orange);}.rd.dh{background:var(--blue);}
.rl{width:1px;height:6px;background:var(--border);margin-left:2px;}
.meta{display:flex;flex-wrap:wrap;gap:7px;font-size:0.63rem;color:var(--muted);margin-bottom:4px;}
.buf{display:inline-flex;align-items:center;gap:3px;font-size:0.63rem;font-family:'IBM Plex Mono',monospace;padding:2px 7px;border-radius:4px;font-weight:600;}
.buf.ok{background:rgba(0,230,118,0.12);color:var(--green);}
.buf.warn{background:rgba(255,215,64,0.12);color:var(--yellow);}
.buf.tight{background:rgba(255,82,82,0.12);color:var(--red);}
.driver{font-size:0.65rem;color:var(--muted);border-top:1px solid var(--border);padding-top:5px;margin-top:5px;}
.driver strong{color:var(--text);}
.actions{display:flex;gap:6px;margin-top:6px;border-top:1px solid var(--border);padding-top:6px;flex-wrap:wrap;}
.bs{font-size:0.62rem;padding:4px 10px;border-radius:5px;border:none;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-weight:600;}
.bs.del{background:rgba(255,82,82,0.12);color:var(--red);}
.bs.edt{background:rgba(64,196,255,0.12);color:var(--blue);}
.bs.don{background:rgba(0,230,118,0.15);color:var(--green);}
.bs.und{background:rgba(84,110,122,0.15);color:var(--muted);}
.day-sum{margin-top:8px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;display:flex;justify-content:space-between;align-items:center;}
.ds-l{font-size:0.6rem;color:var(--muted);text-transform:uppercase;}
.ds-v{font-family:'IBM Plex Mono',monospace;font-size:1.2rem;font-weight:600;color:var(--green);}
.grand{margin-top:6px;padding:14px 18px;background:var(--surface);border:1px solid var(--green);border-radius:12px;display:flex;justify-content:space-between;align-items:center;}
.gt-l{font-family:'Syne',sans-serif;font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;}
.gt-v{font-family:'IBM Plex Mono',monospace;font-size:1.5rem;font-weight:600;color:var(--green);}
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.fabs{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));right:20px;display:flex;flex-direction:column;gap:10px;z-index:200;align-items:center;}
.fab{width:58px;height:58px;border-radius:50%;background:var(--green);color:#080b10;border:none;font-size:1.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(0,230,118,0.45);}
.fab2{width:50px;height:50px;border-radius:50%;background:#0f1520;color:var(--green);border:2px solid var(--green);font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,230,118,0.2);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:300;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#0d1b2a;border:1px solid var(--border);border-radius:20px 20px 0 0;padding:24px 20px;padding-bottom:calc(24px + env(safe-area-inset-bottom));width:100%;max-width:680px;max-height:92vh;overflow-y:auto;}
.modal-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--green);margin-bottom:18px;}
.fg{margin-bottom:12px;}
.fl{font-size:0.63rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;display:block;}
.fi{width:100%;background:#080b10;border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.85rem;outline:none;}
.fi:focus{border-color:var(--green);}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.btn-p{width:100%;background:var(--green);color:#080b10;border:none;border-radius:10px;padding:13px;font-size:0.9rem;font-weight:800;font-family:'Syne',sans-serif;cursor:pointer;margin-top:8px;}
.btn-c{width:100%;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:11px;font-size:0.85rem;cursor:pointer;margin-top:6px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div><div class="app-title">🚗 Ride Planner</div><div class="app-sub">Lyft · Los Angeles, CA</div></div>
    <div><div class="live-clock" id="clock">--:--:--</div><div class="live-date" id="cdate">—</div></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-val g" id="s-total">$0.00</div><div class="stat-lbl">Celkem</div></div>
    <div class="stat"><div class="stat-val y" id="s-bonus">$0.00</div><div class="stat-lbl">Bonusy</div></div>
    <div class="stat"><div class="stat-val b" id="s-miles">0 mi</div><div class="stat-lbl">Míle</div></div>
    <div class="stat"><div class="stat-val o" id="s-done">0/0</div><div class="stat-lbl">Hotovo</div></div>
  </div>
</div>

<div class="syncbar" id="syncbar"></div>

<div class="banner" id="banner">
  <div class="banner-label" id="b-label"></div>
  <div class="banner-title" id="b-title"></div>
  <div class="banner-sub" id="b-sub"></div>
  <div class="progress-bar"><div class="progress-fill" id="b-prog" style="width:0%"></div></div>
</div>

<div class="content" id="content"></div>

<div class="fabs">
  <button class="fab2" id="btn-paste" title="Vložit jízdy">📋</button>
  <button class="fab" id="btn-add">+</button>
</div>

<!-- PASTE MODAL -->
<div class="modal-bg" id="paste-bg">
  <div class="modal">
    <div class="modal-title">📋 Vložit jízdy</div>
    <p style="font-size:0.75rem;color:var(--muted);margin-bottom:14px;line-height:1.6;">
      1. Pošli screenshot z Lyftu sem Claudeovi<br>
      2. Claude ti pošle text → zkopíruj ho<br>
      3. Vlož sem (Cmd+V) → Import!
    </p>
    <div class="fg">
      <label class="fl">Vlož text od Claudea</label>
      <textarea class="fi" id="paste-txt" rows="8" style="font-family:monospace;font-size:0.72rem;min-height:150px;" placeholder="2026-03-13|05:00|5|5757 W Century Blvd LA|300 World Way LA|6.66|0|1.4|Tarell|5.0&#10;2026-03-13|05:30|17|665 6th St Hermosa Beach|400 World Way LA|9.00|0|7.2|Barbra|5.0"></textarea>
    </div>
    <div id="paste-prev" style="margin-bottom:8px;"></div>
    <button class="btn-p" id="btn-import">🚀 Import</button>
    <button class="btn-c" id="btn-paste-cancel">Zrušit</button>
  </div>
</div>

<!-- RIDE MODAL -->
<div class="modal-bg" id="ride-bg">
  <div class="modal">
    <div class="modal-title" id="ride-modal-title">➕ Přidat jízdu</div>
    <input type="hidden" id="edit-id">
    <div class="fg"><label class="fl">Datum</label><input type="date" class="fi" id="f-date"></div>
    <div class="fr">
      <div class="fg"><label class="fl">Čas</label><input type="time" class="fi" id="f-time"></div>
      <div class="fg"><label class="fl">Délka (min)</label><input type="number" class="fi" id="f-dur" placeholder="20"></div>
    </div>
    <div class="fg"><label class="fl">Odkud</label><input type="text" class="fi" id="f-from" placeholder="Adresa vyzvednutí"></div>
    <div class="fg"><label class="fl">Kam</label><input type="text" class="fi" id="f-to" placeholder="Adresa cíle"></div>
    <div class="fr3">
      <div class="fg"><label class="fl">Cena ($)</label><input type="number" step="0.01" class="fi" id="f-price" placeholder="15.00"></div>
      <div class="fg"><label class="fl">Bonus ($)</label><input type="number" step="0.01" class="fi" id="f-bonus" placeholder="0.00"></div>
      <div class="fg"><label class="fl">Míle</label><input type="number" step="0.1" class="fi" id="f-miles" placeholder="10.0"></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">Řidič</label><input type="text" class="fi" id="f-driver" placeholder="John"></div>
      <div class="fg"><label class="fl">Hodnocení</label><input type="number" step="0.1" min="1" max="5" class="fi" id="f-rating" placeholder="5.0"></div>
    </div>
    <button class="btn-p" id="btn-save">Uložit jízdu</button>
    <button class="btn-c" id="btn-cancel">Zrušit</button>
  </div>
</div>

<script>
const URL_ = 'https://xdyxakzhdskfgwifptmf.supabase.co';
const KEY_ = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkeXhha3poZHNrZmd3aWZwdG1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE4MjI5NTMsImV4cCI6MjA1NzM5ODk1M30.8D7136wqx_OyxGnGmXb-O3G7BEiN7RNsU_D9HHgJ9Ys';
const H = {'Content-Type':'application/json','apikey':KEY_,'Authorization':'Bearer '+KEY_,'Prefer':'return=representation'};

let rides=[];

function sync(msg,t){const e=document.getElementById('syncbar');e.textContent=msg;e.className='syncbar show '+t;if(t==='ok')setTimeout(()=>e.classList.remove('show'),2500);}
function toMin(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function addMin(t,m){const tot=toMin(t)+m;return String(Math.floor(tot/60)).padStart(2,'0')+':'+String(tot%60).padStart(2,'0');}
function diffMin(t1,t2){return toMin(t2)-toMin(t1);}
function todayStr(){return new Date().toISOString().slice(0,10);}
function nowMin(){const n=new Date();return n.getHours()*60+n.getMinutes();}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function fmtDate(s){return new Date(s+'T00:00:00').toLocaleDateString('cs-CZ',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function bc(m){return m>=15?'ok':m>=5?'warn':'tight';}
function bi(m){return m>=15?'✓':m>=5?'⚠':'✗';}

// Clock
function tick(){
  const n=new Date();
  document.getElementById('clock').textContent=n.toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('cdate').textContent=n.toLocaleDateString('cs-CZ',{weekday:'short',day:'numeric',month:'numeric'});
  updateBanner();
}
setInterval(tick,1000);tick();

function updateBanner(){
  const today=todayStr(),now=nowMin();
  const tr=rides.filter(r=>r.date===today&&!r.done).sort((a,b)=>a.time.localeCompare(b.time));
  let active=null,next=null;
  for(const r of tr){const s=toMin(r.time);if(now>=s&&now<s+r.duration){active=r;break;}}
  if(!active)for(const r of tr){if(toMin(r.time)>now){next=r;break;}}
  const b=document.getElementById('banner');
  if(active){
    b.classList.add('show');
    document.getElementById('b-label').textContent='🟢 Právě jedeš';
    document.getElementById('b-title').textContent=active.from_addr+' → '+active.to_addr;
    document.getElementById('b-sub').textContent='Konec: '+addMin(active.time,active.duration)+' · $'+Number(active.price).toFixed(2);
    document.getElementById('b-prog').style.width=Math.min(100,Math.round((now-toMin(active.time))/active.duration*100))+'%';
  } else if(next){
    b.classList.add('show');
    document.getElementById('b-label').textContent='⏳ Další jízda za '+(toMin(next.time)-now)+' min';
    document.getElementById('b-title').textContent=next.from_addr+' → '+next.to_addr;
    document.getElementById('b-sub').textContent='Pickup: '+next.time+' · $'+Number(next.price).toFixed(2);
    document.getElementById('b-prog').style.width='0%';
  } else {
    b.classList.remove('show');
  }
}

async function loadRides(){
  sync('⏳ Načítám...','s');
  try{
    const res=await fetch(URL_+'/rest/v1/rides?select=*&order=date.asc,time.asc',{headers:H});
    rides=await res.json();
    if(!Array.isArray(rides))rides=[];
    sync('✓ Online','ok');
  }catch(e){
    sync('⚠ Offline','err');
    rides=[];
  }
  render();
}

async function dbAdd(r){try{await fetch(URL_+'/rest/v1/rides',{method:'POST',headers:H,body:JSON.stringify(r)});}catch(e){}}
async function dbUpdate(id,d){try{await fetch(URL_+'/rest/v1/rides?id=eq.'+id,{method:'PATCH',headers:H,body:JSON.stringify(d)});}catch(e){}}
async function dbDelete(id){try{await fetch(URL_+'/rest/v1/rides?id=eq.'+id,{method:'DELETE',headers:H});}catch(e){}}

function render(){
  const sorted=[...rides].sort((a,b)=>a.date!==b.date?a.date.localeCompare(b.date):a.time.localeCompare(b.time));
  const tot=sorted.reduce((s,r)=>s+Number(r.price)+Number(r.bonus),0);
  const bon=sorted.reduce((s,r)=>s+Number(r.bonus),0);
  const mi=sorted.reduce((s,r)=>s+Number(r.miles),0);
  const dn=sorted.filter(r=>r.done).length;
  document.getElementById('s-total').textContent='$'+tot.toFixed(2);
  document.getElementById('s-bonus').textContent='$'+bon.toFixed(2);
  document.getElementById('s-miles').textContent=mi.toFixed(1)+' mi';
  document.getElementById('s-done').textContent=dn+'/'+sorted.length;

  if(!sorted.length){
    document.getElementById('content').innerHTML='<div class="empty"><div style="font-size:3rem;margin-bottom:16px">🚗</div><p>Žádné jízdy.<br>Klikni <strong style="color:var(--green)">+</strong> nebo <strong style="color:var(--green)">📋</strong></p></div>';
    return;
  }

  const today=todayStr(),now=nowMin();
  const byDate={};
  sorted.forEach(r=>{(byDate[r.date]=byDate[r.date]||[]).push(r);});
  const dates=Object.keys(byDate).sort();
  const nextId=sorted.filter(r=>r.date===today&&!r.done&&toMin(r.time)>now).map(r=>r.id)[0]||null;

  let html='',gTot=0,gMi=0;
  dates.forEach(date=>{
    const dr=byDate[date];
    const dT=dr.reduce((s,r)=>s+Number(r.price)+Number(r.bonus),0);
    const dB=dr.reduce((s,r)=>s+Number(r.bonus),0);
    const dM=dr.reduce((s,r)=>s+Number(r.miles),0);
    const dD=dr.filter(r=>r.done).length;
    gTot+=dT;gMi+=dM;
    const lastEnd=addMin(dr[dr.length-1].time,dr[dr.length-1].duration);

    html+=`<div class="day-block"><div class="day-header"><div><div class="day-title">${fmtDate(date)}</div><div style="font-size:0.56rem;color:var(--muted);margin-top:2px">${dr.length} jízd · ${dr[0].time}–${lastEnd} · ${dD}/${dr.length} hotovo</div></div><div><div class="day-earn">$${dT.toFixed(2)}</div>${dB>0?`<div style="font-size:0.56rem;color:var(--muted);text-align:right">+$${dB.toFixed(2)} bonus</div>`:''}</div></div><div class="entries">`;

    dr.forEach((ride,idx)=>{
      const end=addMin(ride.time,ride.duration);
      const sMin=toMin(ride.time),eMin=sMin+ride.duration;
      const isToday=date===today;
      const isActive=isToday&&now>=sMin&&now<eMin&&!ride.done;
      const isNext=isToday&&ride.id===nextId;
      const isDone=ride.done;

      let ec='entry'+(isDone?' done':isActive?' active':isNext?' next':'');
      let bc2='badge',bt=`Jízda ${idx+1}`;
      if(isDone){bc2='badge bd';bt='✓ Hotovo';}
      else if(isActive){bc2='badge ba';bt='🟢 Právě jedeš';}
      else if(isNext){bc2='badge bn';bt='⏳ Další';}

      let dc='dot'+(isDone?' dn':isActive?' act':'');

      html+=`<div class="${ec}"><div class="tc"><div class="tt">${ride.time}</div><div class="${dc}"></div><div class="vl"></div></div><div class="card"><div class="ct"><span class="${bc2}">${bt}</span><div><span class="price">$${Number(ride.price).toFixed(2)}</span>${ride.bonus>0?`<span class="bonus-l">+$${Number(ride.bonus).toFixed(2)} bonus</span>`:''}</div></div><div class="route"><div class="rp"><div class="rd"></div>${ride.from_addr}</div><div class="rl"></div><div class="rp"><div class="rd to"></div>${ride.to_addr}</div></div><div class="meta"><span>⏱ ${ride.duration} min</span><span>📍 ${Number(ride.miles).toFixed(1)} mi</span><span>🏁 ${end}</span></div>${ride.driver?`<div class="driver">Řidič: <strong>${ride.driver}</strong>${ride.rating?` ★ ${ride.rating}`:''}</div>`:''}<div class="actions">${isDone?`<button class="bs und" onclick="toggleDone('${ride.id}',false)">↩ Vrátit</button>`:`<button class="bs don" onclick="toggleDone('${ride.id}',true)">✅ Hotovo</button>`}<button class="bs edt" onclick="editRide('${ride.id}')">✏️ Upravit</button><button class="bs del" onclick="deleteRide('${ride.id}')">🗑 Smazat</button></div></div></div>`;

      if(idx<dr.length-1){
        const nr=dr[idx+1],gap=diffMin(end,nr.time);
        html+=`<div class="entry"><div class="tc"><div class="tt">${end}</div><div class="dot dd"></div><div class="vl"></div></div><div class="card dh"><div class="ct"><span class="badge bh">Přejezd</span><span style="font-size:0.65rem;color:var(--muted)">${gap} min</span></div><div class="route"><div class="rp"><div class="rd dh"></div>${ride.to_addr} → ${nr.from_addr}</div></div><div class="meta"><span>📅 Pickup: ${nr.time}</span></div><span class="buf ${bc(gap)}">${bi(gap)} ${gap} min rezerva</span></div></div>`;
      }
    });

    html+=`</div><div class="day-sum"><div><div class="ds-l">Výdělek ${date}</div><div style="font-size:0.56rem;color:var(--muted);margin-top:2px">${dr.length} jízd · ${dM.toFixed(1)} mi</div></div><div class="ds-v">$${dT.toFixed(2)}</div></div></div>`;
  });

  if(dates.length>1)html+=`<div class="grand"><div><div class="gt-l">Celkový výdělek</div><div style="font-size:0.6rem;color:var(--muted);margin-top:3px">${sorted.length} jízd · ${gMi.toFixed(1)} mi</div></div><div class="gt-v">$${gTot.toFixed(2)}</div></div>`;
  document.getElementById('content').innerHTML=html;
}

async function toggleDone(id,done){rides=rides.map(r=>r.id===id?{...r,done}:r);render();await dbUpdate(id,{done});}
async function deleteRide(id){if(!confirm('Smazat?'))return;rides=rides.filter(r=>r.id!==id);render();await dbDelete(id);}
function editRide(id){const r=rides.find(x=>x.id===id);if(r)openRideModal(r);}

// Ride modal
function openRideModal(ride=null){
  document.getElementById('ride-bg').classList.add('open');
  document.getElementById('ride-modal-title').textContent=ride?'✏️ Upravit jízdu':'➕ Přidat jízdu';
  document.getElementById('edit-id').value=ride?ride.id:'';
  document.getElementById('f-date').value=ride?ride.date:todayStr();
  document.getElementById('f-time').value=ride?ride.time:'';
  document.getElementById('f-dur').value=ride?ride.duration:'';
  document.getElementById('f-from').value=ride?ride.from_addr:'';
  document.getElementById('f-to').value=ride?ride.to_addr:'';
  document.getElementById('f-price').value=ride?ride.price:'';
  document.getElementById('f-bonus').value=ride?ride.bonus:'';
  document.getElementById('f-miles').value=ride?ride.miles:'';
  document.getElementById('f-driver').value=ride?ride.driver:'';
  document.getElementById('f-rating').value=ride?ride.rating:'';
}
function closeRideModal(){document.getElementById('ride-bg').classList.remove('open');}
document.getElementById('btn-add').addEventListener('click',()=>openRideModal());
document.getElementById('btn-cancel').addEventListener('click',closeRideModal);
document.getElementById('ride-bg').addEventListener('click',e=>{if(e.target===e.currentTarget)closeRideModal();});
document.getElementById('btn-save').addEventListener('click',async()=>{
  const id=document.getElementById('edit-id').value;
  const ride={date:document.getElementById('f-date').value,time:document.getElementById('f-time').value,duration:parseInt(document.getElementById('f-dur').value)||0,from_addr:document.getElementById('f-from').value.trim(),to_addr:document.getElementById('f-to').value.trim(),price:parseFloat(document.getElementById('f-price').value)||0,bonus:parseFloat(document.getElementById('f-bonus').value)||0,miles:parseFloat(document.getElementById('f-miles').value)||0,driver:document.getElementById('f-driver').value.trim(),rating:parseFloat(document.getElementById('f-rating').value)||0};
  if(!ride.date||!ride.time||!ride.from_addr||!ride.to_addr||!ride.price){alert('Vyplň datum, čas, adresy a cenu!');return;}
  closeRideModal();
  sync('⏳ Ukládám...','s');
  if(id){rides=rides.map(r=>r.id===id?{...r,...ride}:r);render();await dbUpdate(id,ride);}
  else{const nr={id:genId(),...ride,done:false};rides.push(nr);render();await dbAdd(nr);}
  sync('✓ Uloženo','ok');
});

// Paste modal
document.getElementById('btn-paste').addEventListener('click',()=>{
  document.getElementById('paste-bg').classList.add('open');
  document.getElementById('paste-txt').value='';
  document.getElementById('paste-prev').innerHTML='';
});
document.getElementById('btn-paste-cancel').addEventListener('click',()=>document.getElementById('paste-bg').classList.remove('open'));
document.getElementById('paste-bg').addEventListener('click',e=>{if(e.target===e.currentTarget)document.getElementById('paste-bg').classList.remove('open');});

document.getElementById('paste-txt').addEventListener('input',()=>{
  const lines=document.getElementById('paste-txt').value.trim().split('\n').filter(l=>l.trim()&&l.includes('|'));
  const prev=document.getElementById('paste-prev');
  if(!lines.length){prev.innerHTML='';return;}
  let h=`<div style="font-size:0.65rem;color:var(--muted);margin-bottom:6px">Nalezeno ${lines.length} jízd:</div>`;
  lines.forEach(l=>{const p=l.split('|');if(p.length>=6)h+=`<div style="font-size:0.65rem;padding:4px 8px;background:#0d1a10;border-radius:6px;margin-bottom:4px">${p[0]} ${p[1]} · $${p[5]} · ${p[3].slice(0,20)}…</div>`;});
  prev.innerHTML=h;
});

document.getElementById('btn-import').addEventListener('click',async()=>{
  const lines=document.getElementById('paste-txt').value.trim().split('\n').filter(l=>l.trim()&&l.includes('|'));
  if(!lines.length){alert('Vlož data!');return;}
  sync('⏳ Importuji...','s');
  let count=0;
  for(const line of lines){
    const p=line.split('|');
    if(p.length<6)continue;
    const nr={id:genId(),date:p[0].trim(),time:p[1].trim(),duration:parseInt(p[2])||0,from_addr:p[3].trim(),to_addr:p[4].trim(),price:parseFloat(p[5])||0,bonus:parseFloat(p[6])||0,miles:parseFloat(p[7])||0,driver:p[8]?p[8].trim():'',rating:parseFloat(p[9])||0,done:false};
    rides.push(nr);
    await dbAdd(nr);
    count++;
  }
  document.getElementById('paste-bg').classList.remove('open');
  render();
  sync('✓ Přidáno '+count+' jízd!','ok');
});

loadRides();
</script>
</body>
</html>
