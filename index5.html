<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#00e676">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ride Planner">
<title>Ride Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@400;600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080b10;--surface:#0f1520;--border:#1e2d42;--green:#00e676;--green-dim:rgba(0,230,118,0.1);--blue:#40c4ff;--blue-dim:rgba(64,196,255,0.08);--orange:#ff9100;--red:#ff5252;--yellow:#ffd740;--text:#e8f0fe;--muted:#546e7a;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;padding-bottom:120px;}
.header{background:linear-gradient(180deg,#0d1b2a,#080b10);border-bottom:1px solid var(--border);padding:calc(14px + env(safe-area-inset-top)) 16px 0;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.app-title{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:800;color:var(--green);}
.app-sub{font-family:'IBM Plex Mono',monospace;font-size:0.58rem;color:var(--muted);}
.live-clock{font-family:'IBM Plex Mono',monospace;font-size:1.1rem;font-weight:600;color:var(--green);text-align:right;line-height:1;}
.live-date{font-size:0.55rem;color:var(--muted);margin-top:2px;text-align:right;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-top:1px solid var(--border);}
.stat{background:var(--surface);padding:9px 4px;text-align:center;}
.stat-val{font-family:'IBM Plex Mono',monospace;font-size:0.85rem;font-weight:600;line-height:1;}
.stat-val.g{color:var(--green);}.stat-val.b{color:var(--blue);}.stat-val.o{color:var(--orange);}.stat-val.y{color:var(--yellow);}
.stat-lbl{font-size:0.5rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:3px;}
.current-banner{margin:12px 14px 0;padding:12px 14px;background:rgba(0,230,118,0.08);border:1px solid var(--green);border-radius:12px;display:none;}
.current-banner.show{display:block;}
.cb-label{font-size:0.6rem;color:var(--green);text-transform:uppercase;letter-spacing:0.08em;font-family:'IBM Plex Mono',monospace;margin-bottom:4px;}
.cb-title{font-size:0.85rem;font-weight:600;color:var(--text);}
.cb-sub{font-size:0.7rem;color:var(--muted);margin-top:2px;}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width 1s linear;}
.sync-bar{text-align:center;padding:6px;font-size:0.65rem;font-family:'IBM Plex Mono',monospace;display:none;}
.sync-bar.show{display:block;}
.sync-bar.syncing{color:var(--yellow);}
.sync-bar.ok{color:var(--green);}
.sync-bar.err{color:var(--red);}
.content{max-width:680px;margin:0 auto;padding:12px 14px;}
.day-block{margin-bottom:20px;}
.day-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:12px 12px 0 0;border-bottom:none;}
.day-title{font-family:'Syne',sans-serif;font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;}
.day-total{font-family:'IBM Plex Mono',monospace;font-size:1.05rem;font-weight:600;color:var(--green);}
.day-sub{font-size:0.56rem;color:var(--muted);margin-top:2px;text-align:right;}
.entries{border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;overflow:hidden;}
.entry{display:flex;border-bottom:1px solid var(--border);position:relative;}
.entry:last-child{border-bottom:none;}
.entry.done-ride{opacity:0.45;}
.entry.active-ride{box-shadow:inset 3px 0 0 var(--green);}
.entry.next-ride{box-shadow:inset 3px 0 0 var(--yellow);}
.time-col{width:50px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:12px 0 0;}
.time-txt{font-family:'IBM Plex Mono',monospace;font-size:0.58rem;color:var(--muted);text-align:center;}
.dot{width:12px;height:12px;border-radius:50%;border:2.5px solid;margin:5px 0 0;flex-shrink:0;}
.dot.ride{border-color:var(--green);background:var(--green-dim);}
.dot.dead{border-color:var(--blue);background:var(--blue-dim);}
.dot.active{border-color:var(--green);background:var(--green);box-shadow:0 0 8px var(--green);}
.dot.done-dot{border-color:var(--muted);background:var(--muted);}
.vline{width:2px;flex:1;min-height:14px;background:var(--border);margin-top:4px;}
.card{flex:1;padding:10px 12px 10px 6px;}
.card.ride-card{background:#0d1a10;}
.card.dead-card{background:#0c1420;opacity:0.85;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.badge{font-size:0.55rem;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:0.07em;padding:2px 6px;border-radius:4px;font-weight:600;}
.badge.ride{background:rgba(0,230,118,0.15);color:var(--green);}
.badge.dead{background:rgba(64,196,255,0.12);color:var(--blue);}
.badge.active-badge{background:var(--green);color:#080b10;}
.badge.next-badge{background:rgba(255,215,64,0.2);color:var(--yellow);}
.badge.done-badge{background:rgba(84,110,122,0.2);color:var(--muted);}
.price{font-family:'IBM Plex Mono',monospace;font-size:0.9rem;font-weight:600;color:var(--green);}
.bonus-lbl{font-size:0.58rem;color:var(--yellow);display:block;margin-top:1px;text-align:right;}
.route{display:flex;flex-direction:column;gap:3px;margin-bottom:5px;}
.rp{display:flex;align-items:flex-start;gap:6px;font-size:0.7rem;line-height:1.3;}
.rdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.rdot.from{background:var(--green);}.rdot.to{background:var(--orange);}.rdot.dh{background:var(--blue);}
.rline{width:1px;height:6px;background:var(--border);margin-left:2px;}
.meta{display:flex;flex-wrap:wrap;gap:7px;font-size:0.63rem;color:var(--muted);margin-bottom:4px;}
.buffer{display:inline-flex;align-items:center;gap:3px;font-size:0.63rem;font-family:'IBM Plex Mono',monospace;padding:2px 7px;border-radius:4px;font-weight:600;}
.buffer.ok{background:rgba(0,230,118,0.12);color:var(--green);}
.buffer.warn{background:rgba(255,215,64,0.12);color:var(--yellow);}
.buffer.tight{background:rgba(255,82,82,0.12);color:var(--red);}
.driver{font-size:0.65rem;color:var(--muted);border-top:1px solid var(--border);padding-top:5px;margin-top:5px;}
.driver strong{color:var(--text);}.star{color:var(--yellow);}
.ride-actions{display:flex;gap:6px;margin-top:6px;border-top:1px solid var(--border);padding-top:6px;flex-wrap:wrap;}
.btn-sm{font-size:0.62rem;padding:4px 10px;border-radius:5px;border:none;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-weight:600;}
.btn-delete{background:rgba(255,82,82,0.12);color:var(--red);}
.btn-edit{background:rgba(64,196,255,0.12);color:var(--blue);}
.btn-done{background:rgba(0,230,118,0.15);color:var(--green);}
.btn-undone{background:rgba(84,110,122,0.15);color:var(--muted);}
.done-check{position:absolute;top:10px;right:10px;font-size:1rem;}
.day-summary{margin-top:8px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;display:flex;justify-content:space-between;align-items:center;}
.ds-label{font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;}
.ds-sub{font-size:0.56rem;color:var(--muted);margin-top:2px;}
.ds-val{font-family:'IBM Plex Mono',monospace;font-size:1.2rem;font-weight:600;color:var(--green);}
.grand-total{margin-top:6px;padding:14px 18px;background:var(--surface);border:1px solid var(--green);border-radius:12px;display:flex;justify-content:space-between;align-items:center;}
.gt-label{font-family:'Syne',sans-serif;font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;}
.gt-sub{font-size:0.6rem;color:var(--muted);margin-top:3px;}
.gt-val{font-family:'IBM Plex Mono',monospace;font-size:1.5rem;font-weight:600;color:var(--green);}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state .icon{font-size:3rem;margin-bottom:16px;}
.fab{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));right:20px;width:58px;height:58px;border-radius:50%;background:var(--green);color:#080b10;border:none;font-size:1.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(0,230,118,0.45);z-index:200;transition:transform 0.15s;}
.fab:active{transform:scale(0.9);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:300;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#0d1b2a;border:1px solid var(--border);border-radius:20px 20px 0 0;padding:24px 20px;padding-bottom:calc(24px + env(safe-area-inset-bottom));width:100%;max-width:680px;max-height:92vh;overflow-y:auto;}
.modal-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--green);margin-bottom:18px;}
.form-group{margin-bottom:12px;}
.form-label{font-size:0.63rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;display:block;}
.form-input{width:100%;background:#080b10;border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.85rem;outline:none;}
.form-input:focus{border-color:var(--green);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.btn-primary{width:100%;background:var(--green);color:#080b10;border:none;border-radius:10px;padding:13px;font-size:0.9rem;font-weight:800;font-family:'Syne',sans-serif;cursor:pointer;margin-top:8px;}
.btn-cancel{width:100%;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:11px;font-size:0.85rem;font-family:'Nunito',sans-serif;cursor:pointer;margin-top:6px;}
.legend{margin-top:12px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;}
.legend-title{font-size:0.57rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
.legend-items{display:flex;gap:8px;flex-wrap:wrap;}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div><div class="app-title">🚗 Ride Planner</div><div class="app-sub">Lyft · Los Angeles, CA</div></div>
    <div>
      <div class="live-clock" id="live-clock">--:--:--</div>
      <div class="live-date" id="live-date">—</div>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-val g" id="stat-total">$0.00</div><div class="stat-lbl">Celkem</div></div>
    <div class="stat"><div class="stat-val y" id="stat-bonus">$0.00</div><div class="stat-lbl">Bonusy</div></div>
    <div class="stat"><div class="stat-val b" id="stat-miles">0 mi</div><div class="stat-lbl">Celk. mi</div></div>
    <div class="stat"><div class="stat-val o" id="stat-done">0/0</div><div class="stat-lbl">Hotovo</div></div>
  </div>
</div>
<div class="sync-bar" id="sync-bar">⏳ Načítám jízdy...</div>

<div class="current-banner" id="current-banner">
  <div class="cb-label" id="cb-label">🟢 Právě jedeš</div>
  <div class="cb-title" id="cb-title">—</div>
  <div class="cb-sub" id="cb-sub">—</div>
  <div class="progress-bar"><div class="progress-fill" id="cb-progress" style="width:0%"></div></div>
</div>

<div class="content" id="main-content"></div>
<button class="fab" id="fab">+</button>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-title" id="modal-title">➕ Přidat jízdu</div>
    <input type="hidden" id="edit-id">
    <div class="form-group"><label class="form-label">Datum</label><input type="date" class="form-input" id="f-date"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Čas vyzvednutí</label><input type="time" class="form-input" id="f-time"></div>
      <div class="form-group"><label class="form-label">Délka jízdy (min)</label><input type="number" class="form-input" id="f-duration" placeholder="20"></div>
    </div>
    <div class="form-group"><label class="form-label">Odkud</label><input type="text" class="form-input" id="f-from" placeholder="4250 Glencoe Ave, Marina Del Rey"></div>
    <div class="form-group"><label class="form-label">Kam</label><input type="text" class="form-input" id="f-to" placeholder="1 World Way, LAX"></div>
    <div class="form-row3">
      <div class="form-group"><label class="form-label">Cena ($)</label><input type="number" step="0.01" class="form-input" id="f-price" placeholder="15.00"></div>
      <div class="form-group"><label class="form-label">Bonus ($)</label><input type="number" step="0.01" class="form-input" id="f-bonus" placeholder="0.00"></div>
      <div class="form-group"><label class="form-label">Míle</label><input type="number" step="0.1" class="form-input" id="f-miles" placeholder="10.0"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Řidič</label><input type="text" class="form-input" id="f-driver" placeholder="John"></div>
      <div class="form-group"><label class="form-label">Hodnocení</label><input type="number" step="0.1" min="1" max="5" class="form-input" id="f-rating" placeholder="5.0"></div>
    </div>
    <button class="btn-primary" id="btn-save">Uložit jízdu</button>
    <button class="btn-cancel" id="btn-cancel">Zrušit</button>
  </div>
</div>

<script>
// ── SUPABASE CONFIG ───────────────────────────────────
const SUPA_URL = 'https://xdyxakzhdskfgwifptmf.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkeXhha3poZHNrZmd3aWZwdG1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE4MjI5NTMsImV4cCI6MjA1NzM5ODk1M30.8D7136wqx_OyxGnGmXb-O3G7BEiN7RNsU_D9HHgJ9Ys';

const HEADERS = {
  'Content-Type': 'application/json',
  'apikey': SUPA_KEY,
  'Authorization': 'Bearer ' + SUPA_KEY,
  'Prefer': 'return=representation'
};

const DEFAULT_RIDES = [
  {id:'r1',date:'2026-03-12',time:'03:30',duration:12,from_addr:'4250 Glencoe Ave, Marina Del Rey',to_addr:'5927 W Imperial Hwy, Los Angeles',price:11.08,bonus:2.43,miles:6.1,driver:'Walter',rating:5.0,done:false},
  {id:'r2',date:'2026-03-12',time:'04:45',duration:27,from_addr:'13413 Cumpston St, Van Nuys',to_addr:'1 World Way, LAX',price:20.95,bonus:0,miles:21.1,driver:'Judith',rating:5.0,done:false},
  {id:'r3',date:'2026-03-12',time:'06:05',duration:16,from_addr:'1518 S Beverly Dr, Los Angeles',to_addr:'1199 22nd St, Santa Monica',price:10.49,bonus:0,miles:7.2,driver:'Beth',rating:5.0,done:false},
  {id:'r4',date:'2026-03-12',time:'06:45',duration:9,from_addr:'4727 W 137th St, Hawthorne',to_addr:'18600 Hawthorne Blvd, Torrance',price:7.98,bonus:0,miles:3.8,driver:'Daniel',rating:5.0,done:false},
  {id:'r5',date:'2026-03-12',time:'07:45',duration:52,from_addr:'700 Avenida Mirola, Palos Verdes Peninsula',to_addr:'400 World Way, LAX',price:23.98,bonus:0,miles:14.7,driver:'John',rating:5.0,done:false},
  {id:'r6',date:'2026-03-18',time:'05:50',duration:29,from_addr:'Clinton St & N Kings Rd, Los Angeles',to_addr:'Los Angeles International Airport',price:23.58,bonus:5.77,miles:10.7,driver:'Halle',rating:4.9,done:false},
];

let rides = [];

function syncBar(msg, type) {
  const el = document.getElementById('sync-bar');
  el.textContent = msg;
  el.className = 'sync-bar show ' + type;
  if (type === 'ok') setTimeout(() => el.classList.remove('show'), 2000);
}

async function loadRides() {
  syncBar('⏳ Načítám jízdy...', 'syncing');
  try {
    const res = await fetch(SUPA_URL + '/rest/v1/rides?select=*&order=date.asc,time.asc', { headers: HEADERS });
    const data = await res.json();
    if (data && data.length > 0) {
      rides = data;
      syncBar('✓ Synchronizováno', 'ok');
    } else {
      // First time — seed default rides
      syncBar('⏳ Nahrávám výchozí jízdy...', 'syncing');
      for (const r of DEFAULT_RIDES) {
        await fetch(SUPA_URL + '/rest/v1/rides', { method: 'POST', headers: HEADERS, body: JSON.stringify(r) });
      }
      rides = DEFAULT_RIDES;
      syncBar('✓ Jízdy nahrány', 'ok');
    }
  } catch(e) {
    syncBar('⚠ Offline — používám lokální data', 'err');
    rides = DEFAULT_RIDES;
  }
  render();
  updateBanner();
}

async function addRide(ride) {
  syncBar('⏳ Ukládám...', 'syncing');
  try {
    await fetch(SUPA_URL + '/rest/v1/rides', { method: 'POST', headers: HEADERS, body: JSON.stringify(ride) });
    syncBar('✓ Uloženo', 'ok');
  } catch(e) { syncBar('⚠ Chyba uložení', 'err'); }
}

async function updateRide(id, data) {
  syncBar('⏳ Ukládám...', 'syncing');
  try {
    await fetch(SUPA_URL + '/rest/v1/rides?id=eq.' + id, { method: 'PATCH', headers: HEADERS, body: JSON.stringify(data) });
    syncBar('✓ Uloženo', 'ok');
  } catch(e) { syncBar('⚠ Chyba uložení', 'err'); }
}

async function deleteRideDB(id) {
  try {
    await fetch(SUPA_URL + '/rest/v1/rides?id=eq.' + id, { method: 'DELETE', headers: HEADERS });
  } catch(e) {}
}

// ── TIME HELPERS ──────────────────────────────────────
function addMin(t,m){const[h,mn]=t.split(':').map(Number);const tot=h*60+mn+m;return String(Math.floor(tot/60)).padStart(2,'0')+':'+String(tot%60).padStart(2,'0');}
function diffMin(t1,t2){const[h1,m1]=t1.split(':').map(Number);const[h2,m2]=t2.split(':').map(Number);return(h2*60+m2)-(h1*60+m1);}
function toMin(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function bClass(m){return m>=15?'ok':m>=5?'warn':'tight';}
function bIcon(m){return m>=15?'✓':m>=5?'⚠':'✗';}
function fmtDate(s){const d=new Date(s+'T00:00:00');return d.toLocaleDateString('cs-CZ',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function todayStr(){return new Date().toISOString().slice(0,10);}
function nowMin(){const n=new Date();return n.getHours()*60+n.getMinutes();}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}

function updateClock(){
  const n=new Date();
  document.getElementById('live-clock').textContent=n.toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('live-date').textContent=n.toLocaleDateString('cs-CZ',{weekday:'short',day:'numeric',month:'numeric'});
  updateBanner();
}
setInterval(updateClock,1000);
updateClock();

function updateBanner(){
  const today=todayStr(),now=nowMin();
  const banner=document.getElementById('current-banner');
  const todayRides=rides.filter(r=>r.date===today&&!r.done).sort((a,b)=>a.time.localeCompare(b.time));
  let active=null,next=null;
  for(const r of todayRides){const s=toMin(r.time),e=s+r.duration;if(now>=s&&now<e){active=r;break;}}
  if(!active){for(const r of todayRides){if(toMin(r.time)>now){next=r;break;}}}
  if(active){
    banner.classList.add('show');
    document.getElementById('cb-label').textContent='🟢 Právě jedeš';
    document.getElementById('cb-title').textContent=active.from_addr+' → '+active.to_addr;
    const pct=Math.min(100,Math.round((now-toMin(active.time))/active.duration*100));
    document.getElementById('cb-sub').textContent='Konec: '+addMin(active.time,active.duration)+' · $'+Number(active.price).toFixed(2)+(active.bonus>0?' +$'+Number(active.bonus).toFixed(2)+' bonus':'');
    document.getElementById('cb-progress').style.width=pct+'%';
  } else if(next){
    banner.classList.add('show');
    document.getElementById('cb-label').textContent='⏳ Další jízda dnes za '+(toMin(next.time)-now)+' min';
    document.getElementById('cb-title').textContent=next.from_addr+' → '+next.to_addr;
    document.getElementById('cb-sub').textContent='Pickup: '+next.time+' · $'+Number(next.price).toFixed(2);
    document.getElementById('cb-progress').style.width='0%';
  } else {
    banner.classList.remove('show');
  }
}

function render(){
  const sorted=[...rides].sort((a,b)=>a.date!==b.date?a.date.localeCompare(b.date):a.time.localeCompare(b.time));
  const tot=sorted.reduce((s,r)=>s+Number(r.price)+Number(r.bonus),0);
  const bon=sorted.reduce((s,r)=>s+Number(r.bonus),0);
  const mi=sorted.reduce((s,r)=>s+Number(r.miles),0);
  const doneCount=sorted.filter(r=>r.done).length;
  document.getElementById('stat-total').textContent='$'+tot.toFixed(2);
  document.getElementById('stat-bonus').textContent='$'+bon.toFixed(2);
  document.getElementById('stat-miles').textContent=mi.toFixed(1)+' mi';
  document.getElementById('stat-done').textContent=doneCount+'/'+sorted.length;

  if(!sorted.length){
    document.getElementById('main-content').innerHTML='<div class="empty-state"><div class="icon">🚗</div><p>Žádné jízdy.<br>Klikni <strong style="color:var(--green)">+</strong> a přidej jízdu!</p></div>';
    return;
  }

  const today=todayStr(),now=nowMin();
  const byDate={};
  sorted.forEach(r=>{(byDate[r.date]=byDate[r.date]||[]).push(r);});
  const dates=Object.keys(byDate).sort();
  const todayNextId=sorted.filter(r=>r.date===today&&!r.done&&toMin(r.time)>now).map(r=>r.id)[0]||null;

  let html='',gTot=0,gMi=0;
  dates.forEach(date=>{
    const dr=byDate[date];
    const dTot=dr.reduce((s,r)=>s+Number(r.price)+Number(r.bonus),0);
    const dBon=dr.reduce((s,r)=>s+Number(r.bonus),0);
    const dMi=dr.reduce((s,r)=>s+Number(r.miles),0);
    const dDone=dr.filter(r=>r.done).length;
    gTot+=dTot;gMi+=dMi;
    const lastEnd=addMin(dr[dr.length-1].time,dr[dr.length-1].duration);
    html+=`<div class="day-block"><div class="day-header"><div><div class="day-title">${fmtDate(date)}</div><div style="font-size:0.56rem;color:var(--muted);margin-top:2px">${dr.length} jízd · ${dr[0].time} – ${lastEnd} · ${dDone}/${dr.length} hotovo</div></div><div><div class="day-total">$${dTot.toFixed(2)}</div>${dBon>0?`<div class="day-sub">incl. $${dBon.toFixed(2)} bonus</div>`:''}</div></div><div class="entries">`;
    dr.forEach((ride,idx)=>{
      const endTime=addMin(ride.time,ride.duration);
      const sMin=toMin(ride.time),eMin=sMin+ride.duration;
      const isToday=date===today;
      const isActive=isToday&&now>=sMin&&now<eMin&&!ride.done;
      const isNext=isToday&&ride.id===todayNextId;
      const isDone=ride.done;
      let entryClass='entry'+(isDone?' done-ride':isActive?' active-ride':isNext?' next-ride':'');
      let badgeClass='badge ride',badgeText=`Jízda ${idx+1}`;
      if(isDone){badgeClass='badge done-badge';badgeText='✓ Hotovo';}
      else if(isActive){badgeClass='badge active-badge';badgeText='🟢 Právě jedeš';}
      else if(isNext){badgeClass='badge next-badge';badgeText='⏳ Další';}
      let dotClass='dot '+(isDone?'done-dot':isActive?'active':'ride');
      html+=`<div class="${entryClass}"><div class="time-col"><div class="time-txt">${ride.time}</div><div class="${dotClass}"></div><div class="vline"></div></div><div class="card ride-card">${isDone?'<div class="done-check">✅</div>':''}<div class="card-top"><span class="${badgeClass}">${badgeText}</span><div><span class="price">$${Number(ride.price).toFixed(2)}</span>${ride.bonus>0?`<span class="bonus-lbl">+$${Number(ride.bonus).toFixed(2)} bonus</span>`:''}</div></div><div class="route"><div class="rp"><div class="rdot from"></div>${ride.from_addr}</div><div class="rline"></div><div class="rp"><div class="rdot to"></div>${ride.to_addr}</div></div><div class="meta"><span>⏱ ${ride.duration} min</span><span>📍 ${Number(ride.miles).toFixed(1)} mi</span><span>🏁 Vysadíš: ${endTime}</span></div>${ride.driver?`<div class="driver">Řidič: <strong>${ride.driver}</strong>${ride.rating?` <span class="star">★</span> ${ride.rating}`:''}</div>`:''}<div class="ride-actions">${isDone?`<button class="btn-sm btn-undone" onclick="toggleDone('${ride.id}',false)">↩ Vrátit</button>`:`<button class="btn-sm btn-done" onclick="toggleDone('${ride.id}',true)">✅ Hotovo</button>`}<button class="btn-sm btn-edit" onclick="editRide('${ride.id}')">✏️ Upravit</button><button class="btn-sm btn-delete" onclick="deleteRide('${ride.id}')">🗑 Smazat</button></div></div></div>`;
      if(idx<dr.length-1){
        const nr=dr[idx+1],gap=diffMin(endTime,nr.time);
        html+=`<div class="entry"><div class="time-col"><div class="time-txt">${endTime}</div><div class="dot dead"></div><div class="vline"></div></div><div class="card dead-card"><div class="card-top"><span class="badge dead">Přejezd</span><span style="font-size:0.65rem;color:var(--muted)">${gap} min volno</span></div><div class="route"><div class="rp"><div class="rdot dh"></div>${ride.to_addr} → ${nr.from_addr}</div></div><div class="meta"><span>📅 Pickup: ${nr.time}</span></div><span class="buffer ${bClass(gap)}">${bIcon(gap)} ${gap} min rezerva</span></div></div>`;
      }
    });
    html+=`</div><div class="day-summary"><div><div class="ds-label">Výdělek ${date}</div><div class="ds-sub">${dr.length} jízd · ${dMi.toFixed(1)} mi${dBon>0?` · incl. $${dBon.toFixed(2)} bonus`:''}</div></div><div class="ds-val">$${dTot.toFixed(2)}</div></div></div>`;
  });
  if(dates.length>1)html+=`<div class="grand-total"><div><div class="gt-label">Celkový výdělek</div><div class="gt-sub">${sorted.length} jízd · ${gMi.toFixed(1)} mi</div></div><div class="gt-val">$${gTot.toFixed(2)}</div></div>`;
  html+=`<div class="legend" style="margin-top:12px"><div class="legend-title">Legenda</div><div class="legend-items"><span class="buffer ok">✓ &gt;15 min</span><span class="buffer warn">⚠ &lt;15 min</span><span class="buffer tight">✗ &lt;5 min</span></div></div>`;
  document.getElementById('main-content').innerHTML=html;
}

async function toggleDone(id,done){
  rides=rides.map(r=>r.id===id?{...r,done}:r);
  render();
  await updateRide(id,{done});
}
async function deleteRide(id){
  if(!confirm('Smazat tuto jízdu?'))return;
  rides=rides.filter(r=>r.id!==id);
  render();
  await deleteRideDB(id);
}
function editRide(id){const r=rides.find(x=>x.id===id);if(r)openModal(r);}

function openModal(ride=null){
  document.getElementById('modal-bg').classList.add('open');
  document.getElementById('modal-title').textContent=ride?'✏️ Upravit jízdu':'➕ Přidat jízdu';
  document.getElementById('edit-id').value=ride?ride.id:'';
  document.getElementById('f-date').value=ride?ride.date:todayStr();
  document.getElementById('f-time').value=ride?ride.time:'';
  document.getElementById('f-duration').value=ride?ride.duration:'';
  document.getElementById('f-from').value=ride?ride.from_addr:'';
  document.getElementById('f-to').value=ride?ride.to_addr:'';
  document.getElementById('f-price').value=ride?ride.price:'';
  document.getElementById('f-bonus').value=ride?ride.bonus:'';
  document.getElementById('f-miles').value=ride?ride.miles:'';
  document.getElementById('f-driver').value=ride?ride.driver:'';
  document.getElementById('f-rating').value=ride?ride.rating:'';
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');}
document.getElementById('fab').addEventListener('click',()=>openModal());
document.getElementById('btn-cancel').addEventListener('click',closeModal);
document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.getElementById('btn-save').addEventListener('click',async()=>{
  const id=document.getElementById('edit-id').value;
  const ride={
    date:document.getElementById('f-date').value,
    time:document.getElementById('f-time').value,
    duration:parseInt(document.getElementById('f-duration').value)||0,
    from_addr:document.getElementById('f-from').value.trim(),
    to_addr:document.getElementById('f-to').value.trim(),
    price:parseFloat(document.getElementById('f-price').value)||0,
    bonus:parseFloat(document.getElementById('f-bonus').value)||0,
    miles:parseFloat(document.getElementById('f-miles').value)||0,
    driver:document.getElementById('f-driver').value.trim(),
    rating:parseFloat(document.getElementById('f-rating').value)||0,
  };
  if(!ride.date||!ride.time||!ride.from_addr||!ride.to_addr||!ride.price){alert('Vyplň datum, čas, adresy a cenu!');return;}
  closeModal();
  if(id){
    rides=rides.map(r=>r.id===id?{...r,...ride}:r);
    render();
    await updateRide(id,ride);
  } else {
    const newRide={id:genId(),...ride,done:false};
    rides.push(newRide);
    render();
    await addRide(newRide);
  }
});

loadRides();
</script>
</body>
</html>
